<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>YouTube Video Landing Page with Sound Toggle</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
  }
  .video-section {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: black;
  }
  #videoFrame {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 177.77vh; /* 100 * 16/9 */
    height: 100vh;
    transform: translate(-50%, -50%);
    border: none;
    filter: brightness(0.6);
  }
  @media (max-aspect-ratio: 16/9) {
    #videoFrame {
      width: 100vw;
      height: 56.25vw; /* 100 * 9/16 */
    }
  }
  .video-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    text-align: center;
    text-shadow: 0 0 15px rgba(0,0,0,0.9);
    z-index: 10;
    padding: 0 1rem;
  }
  h1 {
    font-size: 3rem;
    margin-bottom: 0.5rem;
  }
  p {
    font-size: 1.5rem;
    max-width: 600px;
    margin: 0 auto;
  }
  @media (max-width: 600px) {
    h1 {
      font-size: 2rem;
    }
    p {
      font-size: 1rem;
    }
  }
  .sound-toggle {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background-color: rgba(255,255,255,0.8);
    border: none;
    border-radius: 20px;
    padding: 0.5rem 1.2rem;
    font-size: 1rem;
    cursor: pointer;
    z-index: 20;
  }
  .sound-toggle:hover {
    background-color: rgba(255,255,255,1);
  }
</style>
</head>
<body>
  <section class="video-section" aria-label="Video landing background">
    <iframe 
      id="videoFrame"
      src="https://www.youtube.com/embed/Ify7wInFtwc?autoplay=1&mute=1&loop=1&playlist=Ify7wInFtwc&controls=0&showinfo=0&modestbranding=1&iv_load_policy=3&rel=0"
      title="YouTube video player"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
      frameborder="0"
      loading="lazy"
      aria-hidden="true"
    ></iframe>
    <div class="video-content" role="main">
      <h1>Welcome to Our Site</h1>
      <p>Engaging video background landing page with sound toggle.</p>
    </div>
    <button class="sound-toggle" aria-pressed="false" aria-label="Toggle sound on video" id="soundToggleBtn">
      Unmute Sound
    </button>
  </section>

  <script>
    // Get the iframe element
    const videoFrame = document.getElementById('videoFrame');
    const btn = document.getElementById('soundToggleBtn');

    let isMuted = true;

    btn.addEventListener('click', () => {
      if (isMuted) {
        // Unmute: reload iframe with mute=0 to enable sound
        videoFrame.src = videoFrame.src.replace('mute=1', 'mute=0');
        btn.textContent = 'Mute Sound';
        btn.setAttribute('aria-pressed', 'true');
        isMuted = false;
      } else {
        // Mute: reload iframe with mute=1
        videoFrame.src = videoFrame.src.replace('mute=0', 'mute=1');
        btn.textContent = 'Unmute Sound';
        btn.setAttribute('aria-pressed', 'false');
        isMuted = true;
      }
    });
  </script>
</body>
</html>
