<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Combined Video Landing & Interactive Map with Sound Toggle</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-sA+8ePlBEOizd+SI4uAtLz6FZa2hfQMQI+mBqs0V+9M=" crossorigin=""/>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
      scroll-behavior: smooth;
      background: black;
      color: white;
    }
    /* Video background section */
    .video-section {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: black;
    }
    #videoFrame {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 177.77vh; /* maintain 16:9 ratio */
      height: 100vh;
      transform: translate(-50%, -50%);
      border: none;
      filter: brightness(0.6);
      z-index: 1;
    }
    @media (max-aspect-ratio: 16/9) {
      #videoFrame {
        width: 100vw;
        height: 56.25vw;
      }
    }
    .video-content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      text-shadow: 0 0 15px rgba(0, 0, 0, 0.9);
      z-index: 5;
      padding: 0 1rem;
    }
    .video-content h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    .video-content p {
      font-size: 1.5rem;
      max-width: 600px;
      margin: 0 auto;
    }
    @media (max-width: 600px) {
      .video-content h1 {
        font-size: 2rem;
      }
      .video-content p {
        font-size: 1rem;
      }
    }
    .sound-toggle {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(255,255,255,0.8);
      border: none;
      border-radius: 20px;
      padding: 0.5rem 1.2rem;
      font-size: 1rem;
      cursor: pointer;
      z-index: 10;
      color: black;
    }
    .sound-toggle:hover {
      background-color: rgba(255,255,255,1);
    }

    /* Map section styles */
    #map-section {
      padding: 1rem 2rem 3rem;
      background: #f0f2f5;
      min-height: 70vh;
      color: #333;
    }
    #map-section h2 {
      text-align: center;
      margin-bottom: 1rem;
      color: #222;
    }
    #map {
      width: 100%;
      height: 500px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .leaflet-popup-content iframe {
      width: 100%;
      height: 200px;
      border: none;
      border-radius: 5px;
    }
    /* Scroll prompt button */
    .scroll-down-btn {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.7);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 24px;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.3s ease;
      z-index: 9;
    }
    .scroll-down-btn:hover {
      background: rgba(255,255,255,0.9);
    }
  </style>
</head>
<body>
  <section class="video-section" aria-label="Video landing background">
    <iframe 
      id="videoFrame"
      src="https://www.youtube.com/embed/Ify7wInFtwc?autoplay=1&mute=1&loop=1&playlist=Ify7wInFtwc&controls=0&showinfo=0&modestbranding=1&iv_load_policy=3&rel=0"
      title="YouTube video player" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen
      frameborder="0"
      loading="lazy"
      aria-hidden="true"
    ></iframe>
    <div class="video-content" role="main">
      <h1>Welcome to Our Digital Archive</h1>
      <p>Interactive map with metadata-tagged locations and embedded videos</p>
    </div>
    <button class="sound-toggle" aria-pressed="false" aria-label="Toggle sound on video" id="soundToggleBtn">
      Unmute Sound
    </button>
    <button class="scroll-down-btn" aria-label="Scroll to map section" onclick="document.getElementById('map-section').scrollIntoView({ behavior: 'smooth' });">&#x25BC;</button>
  </section>
  <section id="map-section" aria-label="Interactive map section">
    <h2>Explore Our Archive Locations</h2>
    <div id="map"></div>
  </section>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-o9N1jMSiF2wGDi9XHw4DTLz14gfIR9PhEklk0Mc7r30=" crossorigin=""></script>
  <script>
    // Sound toggle functionality
    const videoFrame = document.getElementById('videoFrame');
    const btn = document.getElementById('soundToggleBtn');
    let isMuted = true;
    btn.addEventListener('click', () => {
      if (isMuted) {
        videoFrame.src = videoFrame.src.replace('mute=1', 'mute=0');
        btn.textContent = 'Mute Sound';
        btn.setAttribute('aria-pressed', 'true');
        isMuted = false;
      } else {
        videoFrame.src = videoFrame.src.replace('mute=0', 'mute=1');
        btn.textContent = 'Unmute Sound';
        btn.setAttribute('aria-pressed', 'false');
        isMuted = true;
      }
    });

    // Initialize map
    var map = L.map('map').setView([39.2833, -76.6094], 12);

    // Add OpenStreetMap tile layer
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Archive locations with metadata and embedded videos
    var locations = [
      {
        coords: [39.2833, -76.6094],
        title: 'Inner Harbor',
        description: 'Popular waterfront area with shops and museums.',
        videoUrl: 'https://www.youtube.com/embed/GkWVA7K9fEo'
      },
      {
        coords: [39.2637, -76.5792],
        title: 'Fort McHenry',
        description: 'Historic fort notable for the War of 1812 battle.',
        videoUrl: 'https://www.youtube.com/embed/t6jsN9lNPBU'
      },
      {
        coords: [39.3169, -76.6248],
        title: 'Baltimore Museum of Art',
        description: 'Art museum with significant collections.',
        videoUrl: 'https://www.youtube.com/embed/XDUI4QroDIk'
      }
    ];

    locations.forEach(function(loc) {
      var marker = L.marker(loc.coords).addTo(map);
      var popupContent = `
        <div>
          <h3>${loc.title}</h3>
          <p>${loc.description}</p>
          <iframe src="${loc.videoUrl}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
      `;
      marker.bindPopup(popupContent);
    });
  </script>
</body>
</html>
